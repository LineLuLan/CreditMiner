version: "3.9"

# =============================================================================
# CreditMiner — Local development stack
# Usage: docker compose up -d
# =============================================================================

services:
  postgres:
    image: postgres:15-alpine
    container_name: creditminer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: creditminer
      POSTGRES_PASSWORD: creditminer
      POSTGRES_DB: creditminer_db
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creditminer -d creditminer_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: Adminer for DB inspection at http://localhost:8081
  adminer:
    image: adminer:latest
    container_name: creditminer-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: postgres

volumes:
  postgres_data:
    name: creditminer_postgres_data
